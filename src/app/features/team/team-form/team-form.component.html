<div class="p-6 md:p-8 max-w-xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a routerLink="/teams" class="text-white/30 hover:text-white/70 transition text-sm">← Times</a>
    <span class="text-white/10">|</span>
    <h1 class="text-xl font-bold text-white">{{ isEdit ? 'Editar Time' : 'Novo Time' }}</h1>
  </div>

  @if (error) {
    <div class="mb-4 p-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm">
      {{ error }}
    </div>
  }

  <div class="glass rounded-2xl p-6">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label class="block text-xs font-medium text-white/40 mb-1.5 uppercase tracking-wider">
          Nome
        </label>
        <input
          formControlName="name"
          type="text"
          placeholder="Ex: Flamengo"
          class="input-field"
          [class.border-red-500/40]="name.invalid && name.touched"
        />
        @if (name.invalid && name.touched) {
          <p class="text-xs text-red-400 mt-1">Nome obrigatório.</p>
        }
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-white/40 mb-1.5 uppercase tracking-wider">
            Cidade
          </label>
          <input
            formControlName="city"
            type="text"
            placeholder="Ex: São Paulo"
            class="input-field"
            [class.border-red-500/40]="city.invalid && city.touched"
          />
          @if (city.invalid && city.touched) {
            <p class="text-xs text-red-400 mt-1">Cidade obrigatória.</p>
          }
        </div>
        <div>
          <label class="block text-xs font-medium text-white/40 mb-1.5 uppercase tracking-wider">
            UF
          </label>
          <input
            formControlName="state"
            type="text"
            maxlength="2"
            placeholder="SP"
            class="input-field uppercase"
            [class.border-red-500/40]="state.invalid && state.touched"
          />
          @if (state.invalid && state.touched) {
            <p class="text-xs text-red-400 mt-1">UF inválida (2 letras).</p>
          }
        </div>
      </div>

      <div class="flex gap-3 pt-1">
        <button type="submit" [disabled]="saving" class="btn-primary disabled:opacity-40 cursor-pointer">
          {{ saving ? 'Salvando...' : 'Salvar' }}
        </button>
        <a routerLink="/teams" class="btn-ghost">Cancelar</a>
      </div>
    </form>
  </div>
</div>
