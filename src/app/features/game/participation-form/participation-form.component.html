@if (isFull) {
  <p class="text-sm text-white/40 py-2">✓ Os dois times já foram adicionados (HOME e AWAY).</p>
} @else {
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    @if (error) {
      <div class="p-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm">
        {{ error }}
      </div>
    }

    <div class="grid grid-cols-2 gap-4">
      <div formGroupName="team">
        <label class="block text-xs font-medium text-white/40 mb-1.5 uppercase tracking-wider">
          Time
        </label>
        <select formControlName="id" class="input-field bg-[#1c1b19] text-white/80">
          <option [value]="null">Selecione...</option>
          @for (t of availableTeams; track t.id) {
            <option [value]="t.id">{{ t.name }}</option>
          }
        </select>
      </div>

      <div>
        <label class="block text-xs font-medium text-white/40 mb-1.5 uppercase tracking-wider">
          Mando
        </label>
        <select formControlName="type" class="input-field bg-[#1c1b19] text-white/80">
          <option value="">Selecione...</option>
          @for (t of availableTypes; track t) {
            <option [value]="t">{{ t }}</option>
          }
        </select>
      </div>
    </div>

    <div class="flex gap-3">
      <button
        type="submit"
        [disabled]="saving || form.invalid"
        class="btn-primary disabled:opacity-40 cursor-pointer"
      >
        {{ saving ? 'Salvando...' : 'Adicionar Time' }}
      </button>
      <button type="button" (click)="cancelled.emit()" class="btn-ghost cursor-pointer">
        Cancelar
      </button>
    </div>
  </form>
}
