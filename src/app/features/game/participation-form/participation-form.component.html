<div class="bg-blue-50 border border-blue-200 rounded-xl p-4 space-y-3">
  @if (error) {
    <p class="text-xs text-red-500">{{ error }}</p>
  }
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-wrap gap-3 items-end">
    <div formGroupName="team">
      <label class="block text-xs font-medium text-gray-600 mb-1">Time</label>
      <select
        formControlName="id"
        class="px-3 py-2 border rounded-lg text-sm bg-white border-gray-300 outline-none focus:ring-2 focus:ring-blue-500"
      >
        <option [value]="null">Selecione...</option>
        @for (t of teams; track t.id) {
          <option [value]="t.id">{{ t.name }}</option>
        }
      </select>
    </div>
    <div>
      <label class="block text-xs font-medium text-gray-600 mb-1">Tipo</label>
      <select
        formControlName="type"
        class="px-3 py-2 border rounded-lg text-sm bg-white border-gray-300 outline-none focus:ring-2 focus:ring-blue-500"
      >
        <option value="">Selecione...</option>
        @for (type of types; track type) {
          <option [value]="type">{{ type }}</option>
        }
      </select>
    </div>
    <div class="flex gap-2">
      <button
        type="submit"
        [disabled]="saving"
        class="px-4 py-2 text-xs font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition disabled:opacity-50"
      >
        {{ saving ? 'Salvando...' : 'Adicionar' }}
      </button>
      <button
        type="button"
        (click)="cancelled.emit()"
        class="px-4 py-2 text-xs font-semibold text-gray-600 hover:bg-gray-200 rounded-lg transition"
      >
        Cancelar
      </button>
    </div>
  </form>
</div>
