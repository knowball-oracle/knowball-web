<div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 space-y-3">
  @if (error) {
    <p class="text-xs text-red-500">{{ error }}</p>
  }
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-wrap gap-3 items-end">
    <div formGroupName="referee">
      <label class="block text-xs font-medium text-gray-600 mb-1">Árbitro</label>
      <select
        formControlName="id"
        class="px-3 py-2 border rounded-lg text-sm bg-white border-gray-300 outline-none focus:ring-2 focus:ring-yellow-400"
      >
        <option [value]="null">Selecione...</option>
        @for (r of referees; track r.id) {
          <option [value]="r.id">{{ r.name }}</option>
        }
      </select>
    </div>

    <div>
      <label class="block text-xs font-medium text-gray-600 mb-1">Função</label>
      <select
        formControlName="role"
        class="px-3 py-2 border rounded-lg text-sm bg-white border-gray-300 outline-none focus:ring-2 focus:ring-yellow-400"
      >
        <option value="">Selecione...</option>
        @for (role of roles; track role) {
          <option [value]="role">{{ role }}</option>
        }
      </select>
    </div>

    <div class="flex gap-2">
      <button
        type="submit"
        [disabled]="saving"
        class="px-4 py-2 text-xs font-semibold text-white bg-yellow-500 hover:bg-yellow-600 rounded-lg transition disabled:opacity-50"
      >
        {{ saving ? 'Salvando...' : 'Adicionar' }}
      </button>
      <button
        type="button"
        (click)="cancelled.emit()"
        class="px-4 py-2 text-xs font-semibold text-gray-600 hover:bg-gray-200 rounded-lg transition"
      >
        Cancelar
      </button>
    </div>
  </form>
</div>
