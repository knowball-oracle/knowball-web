<div
  class="min-h-dvh flex items-center justify-center p-4"
  style="
    background:
      radial-gradient(ellipse at 60% 0%, rgba(255, 255, 255, 0.04) 0%, transparent 60%), #06060f;
  "
>
  <div class="glass-liquid rounded-3xl p-10 w-full max-w-md">
    <div class="flex justify-center mb-8">
      <img src="/assets/logo.svg" alt="KnowBall" class="h-12 w-auto" />
    </div>

    <h2 class="text-lg font-semibold text-white mb-1">Verifique seu e-mail</h2>
    <p class="text-sm text-white/40 mb-6">
      Enviamos um código de 6 dígitos para
      <span class="text-white/70">{{ email() }}</span
      >.
    </p>

    @if (error()) {
      <div class="mb-4 p-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm">
        {{ error() }}
      </div>
    }

    @if (resendOk()) {
      <div
        class="mb-4 p-3 rounded-xl bg-green-500/10 border border-green-500/20 text-green-400 text-sm"
      >
        Novo código enviado com sucesso!
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-white/50 mb-1.5 uppercase tracking-wider">
          Código de verificação
        </label>
        <input
          formControlName="code"
          type="text"
          placeholder="000000"
          maxlength="6"
          inputmode="numeric"
          autocomplete="one-time-code"
          class="input-field tracking-[0.5em] text-center"
          [class.border-red-500/40]="code.invalid && code.touched"
        />
        @if (code.invalid && code.touched) {
          <p class="text-xs text-red-400 mt-1">O código deve ter 6 dígitos.</p>
        }
      </div>

      <button
        type="submit"
        [disabled]="form.invalid || loading()"
        class="w-full btn-primary mt-2 py-2.5 text-sm font-semibold disabled:opacity-40 cursor-pointer"
      >
        {{ loading() ? 'Verificando...' : 'Confirmar código' }}
      </button>
    </form>

    <p class="text-center text-sm text-white/30 mt-6">
      Não recebeu o código?
      <button
        type="button"
        (click)="resendCode()"
        [disabled]="loading()"
        class="text-white/70 hover:text-white transition disabled:opacity-40 cursor-pointer bg-transparent border-none"
      >
        Reenviar
      </button>
    </p>

    <p class="text-center text-sm text-white/30 mt-3">
      <a routerLink="/auth/register" class="text-white/70 hover:text-white transition">
        Voltar ao cadastro
      </a>
    </p>
  </div>
</div>
