@if (loadingService.isLoading()) {
  <div class="fixed top-0 left-0 right-0 z-100 h-0.5">
    <div
      class="h-full bg-white/60 animate-pulse w-full origin-left"
      style="animation: progress 1s ease infinite"
    ></div>
  </div>
}

@if (showNavbar) {
  <div class="flex h-dvh overflow-hidden">
    <app-navbar />

    <main class="flex-1 overflow-y-auto pt-14 md:pt-0">
      <router-outlet />
    </main>
  </div>

  <app-kiko-chat />

} @else {
  <router-outlet />
}
