<div class="flex items-start justify-between mb-6">
  <div class="flex items-center gap-3">
    @if (backPath) {
      <a
        [routerLink]="backPath"
        class="text-white/40 hover:text-white/80 transition text-sm flex items-center gap-1"
      >
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M19 12H5M12 5l-7 7 7 7" />
        </svg>
        {{ backLabel }}
      </a>
      <span class="text-white/20">|</span>
    }
    <div>
      <h1 class="text-xl font-bold text-white">{{ title }}</h1>
      @if (subtitle) {
        <p class="text-sm text-white/40 mt-0.5">{{ subtitle }}</p>
      }
    </div>
  </div>

  @if (actionLabel && actionPath) {
    <a [routerLink]="actionPath" class="btn-primary text-sm shrink-0">
      {{ actionLabel }}
    </a>
  }
</div>
