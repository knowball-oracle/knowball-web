<div class="min-h-screen flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md glass rounded-2xl p-8 space-y-6">

    <div class="flex items-center gap-3">
      <a
        routerLink="/dashboard"
        class="p-2 rounded-lg text-white/40 hover:text-white hover:bg-white/10 transition-all duration-200"
        aria-label="Voltar"
      >
        <lucide-icon [img]="ArrowLeftIcon" size="18" />
      </a>
      <h1 class="text-lg font-semibold text-white">Edit Profile</h1>
    </div>

    <div class="flex flex-col items-center gap-3">
      <div class="relative">
        @if (previewPhoto) {
          <img
            [src]="previewPhoto"
            alt="Profile photo"
            class="w-20 h-20 rounded-full object-cover border-2 border-orange-500/40"
          />
        } @else {
          <div
            class="w-20 h-20 rounded-full bg-orange-500/20 border-2 border-orange-500/30 flex items-center justify-center text-2xl font-bold text-orange-400"
          >
            {{ initials() }}
          </div>
        }

        <label
          for="photo-upload"
          class="absolute -bottom-1 -right-1 w-7 h-7 rounded-full bg-orange-500 flex items-center justify-center cursor-pointer hover:bg-orange-400 transition"
          aria-label="Change photo"
        >
          <lucide-icon [img]="CameraIcon" size="13" class="text-white" />
        </label>
        <input
          id="photo-upload"
          type="file"
          accept="image/*"
          class="hidden"
          (change)="onPhotoChange($event)"
        />
      </div>

      <div class="text-center">
        <p class="text-sm font-medium text-white/80">{{ user?.name }}</p>
        @if (auth.isAdmin()) {
          <span class="text-xs text-purple-400">ADMIN</span>
        } @else {
          <span class="text-xs text-white/30">USER</span>
        }
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
      <div class="space-y-1.5">
        <label class="text-xs text-white/50 uppercase tracking-wider">Name</label>
        <input
          formControlName="name"
          type="text"
          class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white placeholder-white/20 focus:outline-none focus:border-orange-500/50 transition"
          placeholder="Your full name"
        />
        @if (form.get('name')?.invalid && form.get('name')?.touched) {
          <p class="text-xs text-red-400">Name must have at least 3 characters.</p>
        }
      </div>

      <div class="space-y-1.5">
        <label class="text-xs text-white/50 uppercase tracking-wider">Email</label>
        <input
          [value]="user?.email"
          type="email"
          disabled
          class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white/30 cursor-not-allowed"
        />
        <p class="text-xs text-white/25">Email cannot be changed.</p>
      </div>

      <button
        type="submit"
        [disabled]="form.invalid"
        class="w-full flex items-center justify-center gap-2 py-2.5 rounded-xl bg-orange-500 hover:bg-orange-400 disabled:opacity-40 disabled:cursor-not-allowed text-white text-sm font-medium transition-all duration-200"
      >
        <lucide-icon [img]="SaveIcon" size="15" />
        Save changes
      </button>
    </form>

  </div>
</div>
