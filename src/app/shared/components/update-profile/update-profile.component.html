<div class="min-h-screen flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md glass rounded-2xl p-8 space-y-6">

    <div class="flex items-center gap-3">
      <button
        (click)="goBack()"
        class="p-2 rounded-lg text-white/40 hover:text-white hover:bg-white/10 transition-all duration-200"
        aria-label="Voltar"
      >
        <lucide-icon [img]="ArrowLeftIcon" size="18" />
      </button>
      <h1 class="text-lg font-semibold text-white">Editar Perfil</h1>
    </div>

    <div class="flex flex-col items-center gap-3">
      <div class="relative">
        @if (photo()) {
          <img
            [src]="photo()"
            alt="Foto de perfil"
            class="w-20 h-20 rounded-full object-cover border-2 border-orange-500/40"
          />
        } @else {
          <div
            class="w-20 h-20 rounded-full bg-orange-500/20 border-2 border-orange-500/30 flex items-center justify-center text-2xl font-bold text-orange-400"
          >
            {{ initials() }}
          </div>
        }

        <label
          for="photo-upload"
          class="absolute -bottom-1 -right-1 w-7 h-7 rounded-full bg-orange-500 flex items-center justify-center cursor-pointer hover:bg-orange-400 transition"
          aria-label="Alterar foto"
        >
          <lucide-icon [img]="CameraIcon" size="13" class="text-white" />
        </label>
        <input
          id="photo-upload"
          type="file"
          accept="image/*"
          class="hidden"
          (change)="onPhotoChange($event)"
        />
      </div>

      <div class="text-center">
        <p class="text-sm font-medium text-white/80">{{ user()?.name }}</p>
        @if (auth.isAdmin()) {
          <span class="text-xs text-purple-400">ADMIN</span>
        } @else {
          <span class="text-xs text-white/30">USER</span>
        }
      </div>
    </div>

    <div class="space-y-4">
      <div class="space-y-1.5">
        <label class="text-xs text-white/50 uppercase tracking-wider">Nome</label>
        <input
          [value]="user()?.name"
          type="text"
          disabled
          class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white/30 cursor-not-allowed"
        />
      </div>

      <div class="space-y-1.5">
        <label class="text-xs text-white/50 uppercase tracking-wider">E-mail</label>
        <input
          [value]="user()?.email"
          type="email"
          disabled
          class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white/30 cursor-not-allowed"
        />
        <p class="text-xs text-white/25">Os dados da conta não podem ser alterados.</p>
      </div>
    </div>

  </div>
</div>
