<button
  class="fixed top-4 left-4 z-50 md:hidden glass rounded-xl p-2 text-white/60 hover:text-white transition"
  (click)="mobileOpen = !mobileOpen"
  aria-label="Menu"
>
  <lucide-icon [img]="mobileOpen ? CloseIcon : MenuIcon" size="20" />
</button>

@if (mobileOpen) {
  <div class="fixed inset-0 bg-black/50 z-30 md:hidden" (click)="mobileOpen = false"></div>
}

<aside
  class="fixed top-0 left-0 h-full w-60 z-40 flex flex-col glass-liquid transition-transform duration-300 md:translate-x-0"
  [class.-translate-x-full]="!mobileOpen"
  [class.translate-x-0]="mobileOpen"
>
  <div class="px-5 py-6 border-b border-white/10">
    <img src="/knowball.svg" alt="KnowBall" class="h-8 w-auto" />
  </div>

  <nav class="flex-1 overflow-y-auto px-3 py-4 space-y-0.5">
    @for (link of links; track link.path) {
      <a
        [routerLink]="link.path"
        routerLinkActive="bg-white/10 text-white"
        [routerLinkActiveOptions]="{ exact: link.path === '/dashboard' }"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-white/40 hover:text-white hover:bg-white/5 transition-all duration-200"
        (click)="mobileOpen = false"
      >
        <lucide-icon [img]="link.icon" size="17" class="shrink-0" />
        <span>{{ link.label }}</span>
      </a>
    }
  </nav>

  <div class="px-3 py-8 border-t border-white/10 space-y-1">
    <div class="flex items-center gap-3 px-3 py-4">
      <div
        class="w-8 h-8 rounded-full bg-orange-500/20 border border-orange-500/30 flex items-center justify-center text-xs font-bold text-orange-400 shrink-0"
      >
        {{ initials() }}
      </div>
      <div class="overflow-hidden">
        <p class="text-sm font-medium text-white/80 truncate">{{ user?.name }}</p>
        <p class="text-xs text-white/30 truncate">{{ user?.role }}</p>
      </div>
    </div>
    <button
      (click)="logout()"
      class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-red-500 bg-red-500/10 hover:text-red-400 hover:bg-red-500/8 transition-all duration-200 cursor-pointer"
    >
      <lucide-icon [img]="LogOutIcon" size="17" class="shrink-0" />
      <span>Sair</span>
    </button>
  </div>
</aside>
