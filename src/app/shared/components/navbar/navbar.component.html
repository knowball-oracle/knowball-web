<button
  class="fixed top-4 left-4 z-50 md:hidden glass rounded-xl p-2 text-white/60 hover:text-white transition"
  (click)="mobileOpen = !mobileOpen"
  aria-label="Menu"
>
  <lucide-icon [img]="mobileOpen ? CloseIcon : MenuIcon" size="20" />
</button>

@if (mobileOpen) {
  <div class="fixed inset-0 bg-black/50 z-30 md:hidden" (click)="mobileOpen = false"></div>
}

<aside
  class="fixed top-0 left-0 h-full w-60 z-40 flex flex-col glass-liquid transition-transform duration-300 md:translate-x-0"
  [class.-translate-x-full]="!mobileOpen"
  [class.translate-x-0]="mobileOpen"
>
  <div class="pl-12 pr-3 py-3 border-b border-white/10 md:pl-3">
    <a routerLink="/dashboard">
      <img src="/assets/logo.svg" alt="KnowBall" class="h-8 w-auto mt-2 logo-adaptive" />
    </a>
  </div>

  <nav class="flex-1 overflow-y-auto px-3 py-4 space-y-0.5">
    @for (link of links; track link.path) {
      @if (link.path !== '/users' || auth.isAdmin()) {
        <a
          [routerLink]="link.path"
          routerLinkActive="bg-white/10 text-white"
          [routerLinkActiveOptions]="{ exact: link.path === '/dashboard' }"
          class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-white hover:text-white hover:bg-white/5 transition-all duration-200"
          (click)="mobileOpen = false"
        >
          <lucide-icon [img]="link.icon" size="17" />
          <span>{{ link.label }}</span>
        </a>
      }
    }
  </nav>

  <div class="px-3 pt-2 pb-3 border-t border-white/8">
    <div class="flex items-center gap-2 py-1.5">
      <a
        routerLink="/profile"
        (click)="mobileOpen = false"
        class="flex items-center gap-2.5 px-2 py-1.5 rounded-xl flex-1 min-w-0 hover:bg-white/5 transition-all duration-200"
      >
        <div
          class="w-8 h-8 rounded-full border flex items-center justify-center shrink-0 overflow-hidden"
          [class.bg-orange-500/20]="!photo()"
          [class.border-orange-500/30]="!photo()"
          [class.border-transparent]="!!photo()"
        >
          @if (photo()) {
            <img [src]="photo()" alt="Foto de perfil" class="w-full h-full object-cover" />
          } @else {
            <span class="text-xs font-bold text-orange-400">{{ initials() }}</span>
          }
        </div>
        <div class="min-w-0 flex-1">
          <p class="text-sm font-medium text-white/80 truncate leading-tight">{{ user()?.name }}</p>
          @if (auth.isAdmin()) {
            <span class="text-xs text-purple-400 leading-tight">ADMIN</span>
          } @else {
            <span class="text-xs text-white/30 leading-tight">USER</span>
          }
        </div>
      </a>

      <button
        (click)="themeService.toggle()"
        [title]="themeService.isDark() ? 'Mudar para tema claro' : 'Mudar para tema escuro'"
        aria-label="Alternar tema"
        class="theme-pill shrink-0"
        [class.theme-pill-light]="!themeService.isDark()"
      >
        <span class="theme-pill-icon" [class.theme-pill-icon-active]="!themeService.isDark()">
          <lucide-icon [img]="SunIcon" size="12" />
        </span>
        <span
          class="theme-pill-thumb"
          [class.theme-pill-thumb-right]="!themeService.isDark()"
        ></span>
        <span class="theme-pill-icon" [class.theme-pill-icon-active]="themeService.isDark()">
          <lucide-icon [img]="MoonIcon" size="12" />
        </span>
      </button>

      <button
        (click)="logout()"
        title="Sair"
        class="p-1.5 rounded-lg text-white/25 hover:text-red-400 hover:bg-red-500/10 transition-all duration-200 shrink-0 cursor-pointer"
      >
        <lucide-icon [img]="LogOutIcon" size="16" />
      </button>
    </div>
  </div>
</aside>
