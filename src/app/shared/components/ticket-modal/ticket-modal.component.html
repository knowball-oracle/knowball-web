@if (visible) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm"
    (click)="close()"
  >
    <div
      class="glass rounded-2xl p-8 max-w-sm w-full mx-4 flex flex-col items-center gap-4 text-center"
      (click)="$event.stopPropagation()"
    >
      <lucide-icon [img]="CircleCheck" class="text-green-400" [size]="40" />

      <div>
        <h2 class="text-lg font-bold text-white mb-1">Denúncia Registrada!</h2>
        <p class="text-sm text-white/50">Guarde seu número de protocolo:</p>
      </div>

      <div class="bg-white/5 border border-white/10 rounded-xl px-6 py-3 flex items-center gap-3">
        <span class="text-xl font-mono font-bold text-red-500 tracking-widest">
          {{ protocolo }}
        </span>
        <button
          (click)="copiar()"
          class="text-white/40 hover:text-white transition-colors cursor-pointer"
          [title]="copied ? 'Copiado!' : 'Copiar protocolo'"
        >
          <lucide-icon [img]="Copy" [size]="16" />
        </button>
      </div>

      @if (copied) {
        <p class="text-xs text-green-400 -mt-2">✓ Protocolo copiado!</p>
      }

      <p class="text-xs text-white/30">Use este código para acompanhar o status da sua denúncia.</p>

      <button (click)="close()" class="btn-primary w-full mt-1 cursor-pointer">Entendido</button>
    </div>
  </div>
}
